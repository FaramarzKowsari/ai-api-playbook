<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Page Not Found | AI APIs in Practice</title>

  <meta name="description"
        content="The requested page could not be found. Return to AI APIs in Practice by Faramarz Kowsari.">

  <meta name="robots" content="noindex, follow">

  <link rel="canonical"
        href="https://faramarzkowsari.github.io/ai-api-playbook/">

  <link rel="icon"
        type="image/svg+xml"
        href="./favicon.svg">

  <style>
    :root {
      color-scheme: dark;
      --background: #07111f;
      --surface: #101d31;
      --text: #f4f7fb;
      --muted: #aebbd0;
      --accent: #66d9ef;
      --accent-2: #a78bfa;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, #172554, transparent 38%),
        var(--background);
    }

    main {
      width: min(680px, 100%);
      padding: clamp(32px, 7vw, 64px);
      text-align: center;
      background: rgba(16, 29, 49, 0.88);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .code {
      margin: 0;
      font-size: clamp(4rem, 18vw, 8rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.06em;
      background:
        linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
    }

    p {
      margin: 0 auto 28px;
      max-width: 520px;
      color: var(--muted);
      line-height: 1.75;
    }

    a {
      display: inline-block;
      padding: 13px 20px;
      color: #07111f;
      font-weight: 800;
      text-decoration: none;
      background: var(--accent);
      border-radius: 11px;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <main>
    <p class="code" aria-hidden="true">404</p>

    <h1>Page not found</h1>

    <p>
      The page may have moved, the address may be incomplete,
      or the requested resource may no longer exist.
    </p>

    <a href="/ai-api-playbook/">
      Return to AI APIs in Practice
    </a>
  </main>
</body>
</html>
